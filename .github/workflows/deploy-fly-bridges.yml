name: Deploy Fly bridges

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-fly-bridges.yml'
      - 'deploy/fly-bridges.json'
      - 'scripts/fly-*.sh'
      - 'bridge-xmpp/**'
      - 'bridge-matrix/**'
  workflow_dispatch:

concurrency:
  group: fly-bridges-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy all Fly bridges
        run: ./scripts/fly-deploy-all.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
