name: Deploy Fly bridges

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-fly-bridges.yml'
      - 'bridge-xmpp/**'
      - 'bridge-matrix/**'
  workflow_dispatch:

concurrency:
  group: fly-bridges-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: bridge-xmpp
            app: alfred-im-bridge-xmpp
          - dir: bridge-matrix
            app: alfred-im-bridge-matrix
    concurrency: fly-${{ matrix.app }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ matrix.app }}
        run: flyctl deploy ./${{ matrix.dir }} --remote-only -a ${{ matrix.app }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
