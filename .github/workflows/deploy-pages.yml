name: Deploy Flutter client to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'client/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'client/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Analyze and test
        run: |
          flutter pub get
          flutter analyze
          flutter test
        working-directory: client

      - name: Build Flutter web (GitHub Pages base path)
        run: flutter build web --release --base-href "/XmppTest/"
        working-directory: client

      - name: SPA fallback for GitHub Pages
        run: cp client/build/web/index.html client/build/web/404.html

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
