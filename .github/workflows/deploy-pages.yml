name: Deploy Flutter client to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'client/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'client/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-alpha
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify (analyze + test)
        run: bash scripts/verify.sh
        working-directory: client

      - name: Build Flutter web (GitHub Pages base path)
        run: flutter build web --release --base-href "/XmppTest/"
        working-directory: client

      - name: SPA fallback for GitHub Pages
        run: cp client/build/web/index.html client/build/web/404.html

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build/web

  # Alpha / sviluppo: ogni build (PR o main) pubblica su https://alfred-im.github.io/XmppTest/
  # Richiede ambiente github-pages con «Deployment branches: All branches»
  # (Settings → Environments → github-pages). Default repo: solo main → PR falliscono.
  deploy-alpha:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry1.outputs.page_url || steps.deployment_retry2.outputs.page_url }}
    steps:
      - name: Deploy Alpha dev (GitHub Pages)
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy Alpha dev (retry 1)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy Alpha dev (retry 2)
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        id: deployment_retry2
        uses: actions/deploy-pages@v4

      - name: Verify Pages deployment
        if: >-
          steps.deployment.outcome == 'failure'
          && steps.deployment_retry1.outcome == 'failure'
          && steps.deployment_retry2.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after 3 attempts."
          exit 1
