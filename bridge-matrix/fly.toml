app = "alfred-im-bridge-matrix"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVICE_NAME = "alfred-bridge-matrix"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
